<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      user-select: none;
    }

    .widget {
      width: 100%; height: 100%;
      background: rgba(13, 17, 23, 0.82);
      border-radius: 16px;
      border: 1px solid rgba(48, 54, 61, 0.5);
      backdrop-filter: blur(14px);
      padding: 10px 14px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color 0.3s;
    }
    .widget:hover { border-color: rgba(88, 166, 255, 0.3); }

    /* ── 头部 ────────────────────────────────── */
    .drag-bar {
      -webkit-app-region: drag;
      display: flex; align-items: center; gap: 8px;
      cursor: move; min-height: 24px; flex-shrink: 0;
    }
    .drag-bar .logo-img { width: 20px; height: 20px; flex-shrink: 0; }
    .drag-bar .title { font-size: 12px; font-weight: 600; color: #c9d1d9; flex: 1; }

    .head-btns {
      -webkit-app-region: no-drag;
      display: flex; gap: 1px;
    }
    .head-btns button {
      width: 22px; height: 22px;
      border: none; background: none; cursor: pointer;
      border-radius: 4px;
      font-size: 14px; color: #8b949e;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
      line-height: 1; padding: 0;
      -webkit-app-region: no-drag;
    }
    .head-btns button:hover { background: rgba(255,255,255,0.08); color: #f0f6fc; }
    .head-btns .btn-close:hover { background: rgba(248,81,73,0.2); color: #f85149; }
    .btn-logout {
      -webkit-app-region: no-drag;
      background: none; border: 1px solid rgba(72,79,88,0.3);
      color: #8b949e; font-size: 11px; border-radius: 4px;
      padding: 1px 6px; cursor: pointer;
    }
    .btn-logout:hover { border-color: #f85149; color: #f85149; }

    /* ── 内容行：三列 ────────────────────────── */
    .content-row {
      display: flex; gap: 10px; flex: 1; min-height: 0;
    }

    /* ── 左：余额卡片 ────────────────────────── */
    .balance-card {
      background: rgba(63,185,80,0.06);
      border: 1px solid rgba(63,185,80,0.2);
      border-radius: 10px; padding: 10px 14px;
      text-align: center;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      position: relative; flex: 1; min-width: 0;
    }
    .balance-card .pulse-dot {
      position: absolute; top: 8px; right: 8px;
      width: 6px; height: 6px; border-radius: 50%;
      background: #3fb950; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .balance-card .bal-value {
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      font-size: 22px; font-weight: 700; color: #3fb950; line-height: 1.1;
    }
    .balance-card .bal-label { font-size: 9px; color: #8b949e; margin-top: 2px; }
    .balance-card .bal-sub { font-size: 8px; color: #484f58; margin-top: 2px; }

    /* ── 中：模型卡片 ────────────────────────── */
    .models-col {
      display: flex; flex-direction: column; gap: 6px;
      flex: 1; justify-content: center; min-width: 0;
    }
    .model-card {
      background: rgba(22,27,34,0.7); border-radius: 6px;
      padding: 6px 10px; border: 1px solid rgba(48,54,61,0.4);
      display: flex; align-items: center; gap: 8px;
    }
    .model-card.flash { border-left: 3px solid #58a6ff; }
    .model-card.pro   { border-left: 3px solid #a56bfe; }
    .model-card.total { border-left: 3px solid #8b949e; }
    .model-card .mc-icon { font-size: 16px; flex-shrink: 0; }
    .model-card .mc-info { flex: 1; min-width: 0; }
    .model-card .mc-name { font-size: 10px; font-weight: 600; color: #c9d1d9; }
    .model-card.flash .mc-name { color: #58a6ff; }
    .model-card.pro   .mc-name { color: #a56bfe; }
    .model-card .mc-tokens {
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      font-size: 13px; font-weight: 600; color: #f0f6fc;
    }
    .model-card .mc-cost {
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      font-size: 10px; color: #8b949e;
    }

    /* ── 右：柱状图 ──────────────────────────── */
    .chart-col {
      flex: 1.5; display: flex; flex-direction: column;
      min-width: 0; position: relative;
    }
    .chart-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 4px; flex-shrink: 0;
    }
    .chart-title { font-size: 9px; color: #8b949e; }
    .bars {
      display: flex; align-items: flex-end; justify-content: space-around;
      gap: 4px; flex: 1; padding: 0 2px;
    }
    .bar-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; height: 100%;
    }
    .bar {
      width: 100%; max-width: 28px; min-height: 2px;
      border-radius: 2px 2px 0 0;
      transition: height 0.8s cubic-bezier(.4,0,.2,1);
    }
    .bar.real { background: linear-gradient(180deg,rgba(88,166,255,.6) 0%,rgba(88,166,255,.18) 100%); }
    .bar.sim  { background: linear-gradient(180deg,rgba(210,153,29,.55) 0%,rgba(210,153,29,.15) 100%); }
    .bar-val {
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      font-size: 7px; color: #8b949e; text-align: center;
      margin-bottom: 2px; white-space: nowrap;
    }
    .bar-date { font-size: 7px; color: #484f58; text-align: center; margin-top: 2px; }

    /* ── 底部状态栏 ──────────────────────────── */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 4px; border-top: 1px solid rgba(48,54,61,0.4);
      font-size: 8px; color: #484f58;
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      flex-shrink: 0;
    }
    .src-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
    .src-dot.real { background: #58a6ff; }
    .src-dot.sim  { background: #d2991d; }

    /* ── 折叠态：170x30 细条 ──────────────────── */
    .widget.collapsed {
      flex-direction: row; align-items: center;
      justify-content: space-between; gap: 0; padding: 0 8px;
      border-radius: 10px;
    }
    .widget.collapsed .collapsed-hide { display: none; }
    .widget.collapsed .drag-bar { min-height: 0; flex: 1; gap: 4px; padding-bottom: 0; }
    .widget.collapsed .drag-bar .title { font-size: 10px; }
    .widget.collapsed .drag-bar .logo-img { display: none; }
    .widget.collapsed .status-bar {
      border-top: none; padding-top: 0; flex-shrink: 0;
      font-size: 0; display: flex; align-items: center;
    }
    .widget.collapsed .status-bar #srcLabel { display: none; }
    .widget.collapsed .status-bar .src-dot { display: none; }
    .widget.collapsed .status-bar #updateTime { font-size: 7px; margin-left: 4px; }
    .widget.collapsed .head-btns button { width: 16px; height: 16px; font-size: 10px; }
  </style>
</head>
<body>

<div class="widget" id="widget">

  <!-- ── 头部 ────────────────────────────────── -->
  <div class="drag-bar">
    <img class="logo-img collapsed-hide" src="deepseek-logo.ico" alt="DS">
    <span class="title">DeepSeek Monitor</span>
    <button id="btnLogout" class="btn-logout collapsed-hide" title="注销">↩</button>
    <div class="head-btns">
      <button id="btnZoomOut" title="缩小">−</button>
      <button id="btnZoomIn"  title="放大">＋</button>
      <button id="btnRefresh" title="刷新">↻</button>
      <button id="btnCollapse" title="折叠">─</button>
      <button id="btnQuit" class="btn-close" title="退出">✕</button>
    </div>
  </div>

  <!-- ── 三列内容 ────────────────────────────── -->
  <div class="content-row collapsed-hide">
    <div class="balance-card">
      <div class="pulse-dot"></div>
      <div class="bal-value" id="balance">--</div>
      <div class="bal-label">账户余额 <span style="color:#3fb950;font-size:8px;">● 可用</span></div>
      <div class="bal-sub" id="balanceSub"></div>
    </div>

    <div class="models-col">
      <div class="model-card flash">
        <span class="mc-icon">⚡</span>
        <div class="mc-info">
          <div class="mc-name">V4 Flash</div>
          <div class="mc-tokens" id="flashTokens">--</div>
          <div class="mc-cost" id="flashCost"></div>
        </div>
      </div>
      <div class="model-card pro">
        <span class="mc-icon">🔮</span>
        <div class="mc-info">
          <div class="mc-name">V4 Pro</div>
          <div class="mc-tokens" id="proTokens">--</div>
          <div class="mc-cost" id="proCost"></div>
        </div>
      </div>
      <div class="model-card total">
        <span class="mc-icon">📅</span>
        <div class="mc-info">
          <div class="mc-name">本月消耗</div>
          <div class="mc-tokens" id="totalTokens">--</div>
          <div class="mc-cost" id="totalCost"></div>
        </div>
      </div>
    </div>

    <div class="chart-col">
      <div class="chart-header">
        <span class="chart-title">📈 近7天 Token</span>
      </div>
      <div class="bars" id="bars"></div>
    </div>
  </div>

  <!-- ── 状态栏 ──────────────────────────────── -->
  <div class="status-bar">
    <span><span class="src-dot" id="srcDot"></span><span id="srcLabel">加载中...</span></span>
    <span id="updateTime">--:--:-- · 60s</span>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
let collapsed = false;

function fmtTokens(n) {
  if (n == null || isNaN(n)) return '--';
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(Math.round(n));
}
function fmtMoney(n) { return (n == null || isNaN(n)) ? '--' : '¥ ' + n.toFixed(2); }

async function loadData() {
  try {
    const data = await window.api.fetchStats();

    if (data.balance && !data.balance._error && data.balance.balance_infos) {
      const info = data.balance.balance_infos[0];
      $('balance').textContent = info.currency + ' ' + parseFloat(info.total_balance).toFixed(2);
      $('balanceSub').textContent = '赠送: ' + info.granted_balance + ' | 充值: ' + info.topped_up_balance;
    } else {
      $('balance').textContent = data.balance?._error ? 'API 异常' : '--';
      $('balanceSub').textContent = data.balance?._error || '';
    }

    const ds = data.dataSource || 'loading';
    const isReal = ds === 'real';
    const isLoading = ds === 'loading';

        $('srcDot').className = 'src-dot ' + (isReal ? 'real' : 'sim');
    $('srcLabel').textContent = isReal ? '实时数据' : (isLoading ? '同步中...' : '估算数据');

    const u = data.usage;
    if (u) {
      const findModel = kw => u.models?.find(m => m.name.includes(kw));
      const flash = findModel('Flash'), pro = findModel('Pro');
      if (flash) { $('flashTokens').textContent = fmtTokens(flash.tokens) + ' tok'; $('flashCost').textContent = fmtMoney(flash.cost); }
      if (pro)   { $('proTokens').textContent = fmtTokens(pro.tokens) + ' tok'; $('proCost').textContent = fmtMoney(pro.cost); }
      // 本月消耗汇总
      $('totalTokens').textContent = fmtTokens(u.totalTokens) + ' tok';
      $('totalCost').textContent = fmtMoney(u.monthCost);

      if (u.daily?.length) {
        const max = Math.max(...u.daily.map(d => d.tokens));
        $('bars').innerHTML = u.daily.map(d => {
          const h = max > 0 ? Math.max(4, (d.tokens / max) * 100) : 0;
          return `<div class="bar-wrap">
            <div class="bar-val">${fmtTokens(d.tokens)}</div>
            <div class="bar ${isReal ? 'real' : 'sim'}" style="height:${h}%"></div>
            <div class="bar-date">${d.date}</div>
          </div>`;
        }).join('');
      }
    } else {
      $('flashTokens').textContent = '--'; $('flashCost').textContent = '--';
      $('proTokens').textContent = '--'; $('proCost').textContent = '--';
      $('totalTokens').textContent = '--'; $('totalCost').textContent = '--';
      $('bars').innerHTML = '';
    }

    const t = new Date(data.updatedAt);
    $('updateTime').textContent =
      String(t.getHours()).padStart(2,'0') + ':' +
      String(t.getMinutes()).padStart(2,'0') + ':' +
      String(t.getSeconds()).padStart(2,'0') + ' · 60s';
  } catch (err) { console.error(err); }
}

// ── 按钮事件 ──────────────────────────────────
$('btnRefresh').addEventListener('click', () => loadData());
$('btnZoomIn').addEventListener('click', async () => { await window.api.zoom(0.1); });
$('btnZoomOut').addEventListener('click', async () => {
  const ok = await window.api.zoom(-0.1);
  if (!ok) {
    // 已到最小，按钮短暂闪一下提示
    $('btnZoomOut').style.color = '#f85149';
    setTimeout(() => { $('btnZoomOut').style.color = ''; }, 200);
  }
});
$('btnQuit').addEventListener('click', () => window.api.quit());
$('btnLogout').addEventListener('click', () => window.api.logout());

$('btnCollapse').addEventListener('click', () => {
  collapsed = !collapsed;
  window.api.toggleSize(collapsed);
  $('widget').classList.toggle('collapsed', collapsed);
  // 图标不变：永远保持横线
});

document.addEventListener('dblclick', (e) => {
  if (e.target.closest('button,.head-btns')) return;
  $('btnCollapse').click();
});

window.api.onRefresh(() => loadData());
loadData();
</script>

</body>
</html>
